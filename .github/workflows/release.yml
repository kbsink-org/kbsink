name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BIN_NAME: kb-sink-md

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build and pack
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME}"
          out="${{ env.BIN_NAME }}"
          if [ "$GOOS" = "windows" ]; then out="${out}.exe"; fi
          go build -trimpath -ldflags="-s -w" -o "$out" ./cmd/kb-sink-md
          asset="${{ env.BIN_NAME }}_${ver}_${GOOS}_${GOARCH}"
          mkdir -p release
          if [ "$GOOS" = "windows" ]; then
            final="${asset}.exe"
            mv "$out" "release/$final"
          else
            final="$asset"
            mv "$out" "$final"
            tar -czf "release/${asset}.tar.gz" "$final"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/*

  publish:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: binary-*
          merge-multiple: true

      - name: SHA256 checksums
        run: |
          set -euo pipefail
          cd dist
          : > SHA256SUMS.txt
          for f in *.tar.gz *.exe; do
            [ -f "$f" ] || continue
            shasum -a 256 "$f" >> SHA256SUMS.txt
          done
          sort -k2 -o SHA256SUMS.txt SHA256SUMS.txt

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
